name: Compute Standings

on:
  pull_request:
    branches: [main]
    paths:
      - 'configs/**'
      - 'pyproject.toml'
  push:
    branches: [main]
    paths:
      - 'configs/**'
      - 'pyproject.toml'

jobs:
  score:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed configs
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          CONFIGS=$(git diff --name-only --diff-filter=AM "$BASE" "${{ github.sha }}" -- 'configs/**/*.jsonnet')
          echo "Found configs: $CONFIGS"
          {
            echo "list<<EOF"
            echo "$CONFIGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install uv
        if: steps.changed.outputs.list != ''
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        if: steps.changed.outputs.list != ''
        run: uv sync

      - name: Run scoring
        if: steps.changed.outputs.list != ''
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          CLIENT_USERNAME: ${{ secrets.CLIENT_USERNAME }}
          CLIENT_PASSWORD: ${{ secrets.CLIENT_PASSWORD }}
        run: |
          while IFS= read -r config; do
            [ -z "$config" ] && continue
            name=$(basename "$config" .jsonnet)
            echo "Scoring $config -> out/$name"
            uv run gpt-scoring run "$config" "./out/$name"
          done <<< "${{ steps.changed.outputs.list }}"

      - name: Upload standings
        if: steps.changed.outputs.list != ''
        uses: actions/upload-artifact@v4
        with:
          name: standings
          path: out/
          retention-days: 30

      - name: Comment standings link on PR
        if: github.event_name == 'pull_request' && steps.changed.outputs.list != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- gpt-standings-link -->';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}\n📊 **Standings computed** — [Download artifacts](${runUrl})\n\n> Expand the run summary and scroll to **Artifacts** to download the standings zip.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
