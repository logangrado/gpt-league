name: Update Season

on:
  schedule:
    # daily 4:00 AM UTC = 10 PM CST (UTC-6) / 11 PM CDT (UTC-5)
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  update-season:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: astral-sh/setup-uv@v5

      - name: Run update-season
        id: update
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          CLIENT_USERNAME: ${{ secrets.CLIENT_USERNAME }}
          CLIENT_PASSWORD: ${{ secrets.CLIENT_PASSWORD }}
        run: |
          set +e
          output=$(uv run gpt-scoring update-season ./configs/gpt/26-1.jsonnet 10301 128672 2>&1)
          exit_code=$?
          echo "$output"
          set -e
          [ $exit_code -eq 0 ] || exit $exit_code
          added=$(echo "$output" | grep "^Added:" | paste -sd ", ")
          echo "added=$added" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet configs/gpt/26-1.jsonnet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
          ADDED: ${{ steps.update.outputs.added }}
        run: |
          branch="auto/update-season"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add configs/gpt/26-1.jsonnet
          git commit -m "$ADDED"
          git push --force origin "$branch"
          if gh pr view "$branch" --json state -q .state 2>/dev/null | grep -q "OPEN"; then
            echo "PR already open for $branch, skipping."
          else
            gh pr create \
              --title "$ADDED" \
              --body "Automated season update via \`gpt-scoring update-season\`." \
              --base main \
              --head "$branch"
          fi
